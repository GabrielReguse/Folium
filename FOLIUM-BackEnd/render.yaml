# ═══════════════════════════════════════════════
#  FOLIUM — render.yaml
#  Configuração de deploy no Render
#  Docs: https://render.com/docs/infrastructure-as-code
# ═══════════════════════════════════════════════

services:
  - type: web
    name: folium-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free

    # Variáveis de ambiente — os valores SECRETOS você preenche
    # direto no painel do Render (não aqui, pra não subir no git)
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      # Preencha no painel do Render:
      # JWT_SECRET      → uma frase longa e aleatória
      # ALLOWED_ORIGIN  → https://seu-projeto.vercel.app
