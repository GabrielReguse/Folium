services:
  - type: web
    name: folium-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: JWT_EXPIRES_DAYS
        value: "7"
      - key: NODE_ENV
        value: production
      # Preencha no painel do Render:
      # JWT_SECRET        → frase longa e aleatória
      # ALLOWED_ORIGIN    → https://seu-projeto.vercel.app
      # DATABASE_URL      → preenchido automaticamente pelo Render
      # GROQ_API_KEY      → chave do Groq (IA 1 — tópicos)
      # GEMINI_API_KEY    → chave do Google AI Studio (IA 2 — folha, primário)
      # CEREBRAS_API_KEY  → chave do Cerebras Cloud (IA 2 — fallback)