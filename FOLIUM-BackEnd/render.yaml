services:
  - type: web
    name: folium-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: JWT_EXPIRES_DAYS
        value: "7"
      - key: NODE_ENV
        value: production
      # Preencha no painel do Render:
      # JWT_SECRET       → frase longa e aleatória
      # ALLOWED_ORIGIN   → https://seu-projeto.vercel.app
      # DATABASE_URL     → preenchido automaticamente pelo Render
      # ANTHROPIC_API_KEY → sua chave sk-ant-...