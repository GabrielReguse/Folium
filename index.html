<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folha — Resumos Inteligentes</title>
  <script>
    /* Redireciona automaticamente para login ou home */
    (function() {
      const PREFIX = 'folium_';
      try {
        const user = localStorage.getItem(PREFIX + 'user');
        window.location.replace(user ? 'FOLIUM/html/home.html' : 'FOLIUM/html/login.html');
      } catch(e) {
        window.location.replace('FOLIUM/html/login.html');
      }
    })();
  </script>
</head>
<body></body>
</html>
