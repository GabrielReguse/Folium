<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folium — Minha Biblioteca</title>
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/favicon-folium.png"
    />
    <link rel="apple-touch-icon" href="../assets/images/favicon-folium.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/dark-mode.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/pages/materia.css" />
    <link rel="stylesheet" href="../css/pages/folhas.css" />
  <script>if(localStorage.getItem("folium-dark")==="1")document.documentElement.dataset.theme="dark";</script>
</head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div id="loading-overlay">
      <div class="loading-box">
        <div class="loader loader-lg"></div>
        <h3 id="ld-title">Carregando...</h3>
        <p id="ld-sub">Aguarde um momento</p>
      </div>
    </div>

    <div class="page page-folhas">
      <div id="fh-skeleton" class="fh-skel-wrap" aria-hidden="true">
        <div class="skeleton sk-hero"></div>
        <div style="height:14px"></div>
        <div class="sk-row" style="gap:8px;margin-bottom:12px">
          <div class="skeleton sk-bar" style="width:120px;border-radius:999px"></div>
          <div class="skeleton sk-bar" style="width:140px;border-radius:999px"></div>
        </div>
        <div class="skeleton sk-bar" style="height:44px;border-radius:12px;margin-bottom:12px"></div>
        <div class="skeleton sk-bar" style="height:42px;border-radius:999px;width:260px;margin-bottom:16px"></div>
        <div class="sk-wrap">
          <div class="skeleton sk-card"></div>
          <div class="skeleton sk-card"></div>
          <div class="skeleton sk-card"></div>
        </div>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils/dom.js"></script>
    <script src="../js/utils/storage.js"></script>
    <script src="../js/utils/helpers.js"></script>
    <script src="../js/mock.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/components/modal.js"></script>
    <script src="../js/components/confirm.js"></script>
    <script src="../js/components/navbar.js"></script>
    <script src="../js/components/sidebar.js"></script>
    <script src="../js/components/card.js"></script>
    <script src="../js/components/button.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/pages/folhas.js"></script>
  </body>
</html>
