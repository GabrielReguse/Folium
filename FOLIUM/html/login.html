<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folium — Entrar</title>
  <link rel="icon" type="image/png" href="../assets/images/favicon-folium.png">
  <link rel="apple-touch-icon" href="../assets/images/favicon-folium.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/pages/login.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
    <div id="loading-overlay">
    <div class="loading-box">
      <div class="loader loader-lg"></div>
      <h3 id="ld-title">Processando...</h3>
      <p id="ld-sub">Aguarde um momento</p>
    </div>
  </div>
  <div class="login-page">
    <div class="login-card scale-in">
      <div class="login-logo">
        <div class="logo-mark"><svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="56" height="56" rx="16" fill="#9B6B42"/><path d="M28 10 C18 16 14 26 15 36 C16 45 21 51 28 52 C35 51 40 45 41 36 C42 26 38 16 28 10Z" fill="white" opacity="0.92"/><line x1="28" y1="13" x2="28" y2="50" stroke="#9B6B42" stroke-width="1.5" stroke-linecap="round"/><line x1="28" y1="24" x2="16" y2="32" stroke="#9B6B42" stroke-width="1" stroke-linecap="round" opacity=".7"/><line x1="28" y1="24" x2="40" y2="32" stroke="#9B6B42" stroke-width="1" stroke-linecap="round" opacity=".7"/></svg></div>
        <h1>Foli<em>um</em></h1>
        <p>Seus resumos inteligentes</p>
      </div>

      <!-- ── Login ── -->
      <div class="lform" id="f-login">
        <div class="inp-group"><label class="inp-label">E-mail</label><input type="email" class="inp" id="l-email" placeholder="seu@email.com"></div>
        <div class="inp-group"><label class="inp-label">Senha</label><input type="password" class="inp" id="l-pass" placeholder="••••••••"></div>
        <button class="btn btn-primary btn-full btn-lg" onclick="doAuth()">Entrar</button>
        <div class="divider">ou</div>
        <button class="btn btn-google btn-full" onclick="doGoogleLogin()">
          <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar com Google
        </button>
        <div class="divider"></div>
        <button class="btn btn-secondary btn-full" onclick="swapForm('register')">Criar conta gratuita</button>
      </div>

      <!-- ── Cadastro ── -->
      <div class="lform" id="f-register" style="display:none">
        <div class="inp-group"><label class="inp-label">Nome completo</label><input type="text" class="inp" id="r-name" placeholder="Ana Clara"></div>
        <div class="inp-group"><label class="inp-label">E-mail</label><input type="email" class="inp" id="r-email" placeholder="seu@email.com"></div>
        <div class="inp-group"><label class="inp-label">Senha</label><input type="password" class="inp" id="r-pass" placeholder="Mínimo 4 caracteres"></div>
        <button class="btn btn-primary btn-full btn-lg" onclick="doAuth()">Criar conta</button>
      </div>

      <!-- ── Verificação de código ── -->
      <div class="lform" id="f-verify" style="display:none">
        <div class="verify-header">
          <div class="verify-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="14" fill="#F5EDD6"/><path d="M12 18l12 8 12-8" stroke="#9B6B42" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="10" y="14" width="28" height="20" rx="3" stroke="#9B6B42" stroke-width="2" fill="none"/></svg>
          </div>
          <h2 class="verify-title">Verifique seu e-mail</h2>
          <p class="verify-sub">Enviamos um código de 6 dígitos para<br><strong id="verify-email-display"></strong></p>
        </div>
        <div class="code-inputs" id="code-inputs">
          <input type="text" maxlength="1" class="code-digit" data-idx="0" inputmode="numeric" autocomplete="one-time-code">
          <input type="text" maxlength="1" class="code-digit" data-idx="1" inputmode="numeric">
          <input type="text" maxlength="1" class="code-digit" data-idx="2" inputmode="numeric">
          <input type="text" maxlength="1" class="code-digit" data-idx="3" inputmode="numeric">
          <input type="text" maxlength="1" class="code-digit" data-idx="4" inputmode="numeric">
          <input type="text" maxlength="1" class="code-digit" data-idx="5" inputmode="numeric">
        </div>
        <button class="btn btn-primary btn-full btn-lg" id="btn-verify" onclick="doVerify()">Verificar</button>
        <div class="verify-actions">
          <span class="verify-resend" id="resend-link">Reenviar código</span>
          <span class="verify-separator">|</span>
          <span class="verify-back" onclick="backFromVerify()">Voltar</span>
        </div>
      </div>

      <div class="lswitch" id="sw-login">Não tem conta? <a onclick="swapForm('register')">Cadastre-se</a></div>
      <div class="lswitch" id="sw-register" style="display:none">Já tem conta? <a onclick="swapForm('login')">Entrar</a></div>
    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/utils/dom.js"></script>
  <script src="../js/utils/storage.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/mock.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/components/modal.js"></script>
  <script src="../js/components/confirm.js"></script>
  <script src="../js/components/navbar.js"></script>
  <script src="../js/components/sidebar.js"></script>
  <script src="../js/components/card.js"></script>
  <script src="../js/components/button.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/login.js"></script>
</body>
</html>
