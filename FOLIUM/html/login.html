<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folium — Entrar</title>
  <link rel="icon" type="image/png" href="../assets/images/favicon-folium.png">
  <link rel="apple-touch-icon" href="../assets/images/favicon-folium.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/pages/login.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
    <div id="loading-overlay">
    <div class="loading-box">
      <div class="loader loader-lg"></div>
      <h3 id="ld-title">Processando...</h3>
      <p id="ld-sub">Aguarde um momento</p>
    </div>
  </div>
  <div class="login-page">
    <div class="login-card scale-in">
      <div class="login-logo">
        <div class="logo-mark"><svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="56" height="56" rx="16" fill="#9B6B42"/><path d="M28 10 C18 16 14 26 15 36 C16 45 21 51 28 52 C35 51 40 45 41 36 C42 26 38 16 28 10Z" fill="white" opacity="0.92"/><line x1="28" y1="13" x2="28" y2="50" stroke="#9B6B42" stroke-width="1.5" stroke-linecap="round"/><line x1="28" y1="24" x2="16" y2="32" stroke="#9B6B42" stroke-width="1" stroke-linecap="round" opacity=".7"/><line x1="28" y1="24" x2="40" y2="32" stroke="#9B6B42" stroke-width="1" stroke-linecap="round" opacity=".7"/></svg></div>
        <h1>Foli<em>um</em></h1>
        <p>Seus resumos inteligentes</p>
      </div>

      <!-- ── LOGIN ──────────────────────────────── -->
      <div class="lform" id="f-login">
        <button type="button" class="btn-google" id="g-btn-login" onclick="doGoogle()">
          <svg class="g-logo" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.1 35 26.7 36 24 36c-5.3 0-9.7-3.4-11.3-8l-6.5 5C9.7 39.7 16.3 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.6l6.2 5.2C41.8 35.8 44 30.3 44 24c0-1.3-.1-2.3-.4-3.5z"/>
          </svg>
          <span>Continuar com Google</span>
        </button>

        <div class="divider">ou</div>

        <div class="inp-group"><label class="inp-label">E-mail</label><input type="email" class="inp" id="l-email" placeholder="seu@email.com"></div>
        <div class="inp-group"><label class="inp-label">Senha</label><input type="password" class="inp" id="l-pass" placeholder="••••••••"></div>
        <button class="btn btn-primary btn-full btn-lg" onclick="doAuth()">Entrar</button>
        <button class="btn btn-secondary btn-full" onclick="swapForm('register')">Criar conta gratuita</button>
      </div>

      <!-- ── REGISTER ──────────────────────────── -->
      <div class="lform" id="f-register" style="display:none">
        <button type="button" class="btn-google" id="g-btn-register" onclick="doGoogle()">
          <svg class="g-logo" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.1 35 26.7 36 24 36c-5.3 0-9.7-3.4-11.3-8l-6.5 5C9.7 39.7 16.3 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.6l6.2 5.2C41.8 35.8 44 30.3 44 24c0-1.3-.1-2.3-.4-3.5z"/>
          </svg>
          <span>Continuar com Google</span>
        </button>

        <div class="divider">ou</div>

        <div class="inp-group"><label class="inp-label">Nome completo</label><input type="text" class="inp" id="r-name" placeholder="Ana Clara"></div>
        <div class="inp-group"><label class="inp-label">E-mail</label><input type="email" class="inp" id="r-email" placeholder="seu@email.com"></div>
        <div class="inp-group"><label class="inp-label">Senha</label><input type="password" class="inp" id="r-pass" placeholder="Mínimo 4 caracteres"></div>
        <button class="btn btn-primary btn-full btn-lg" onclick="doAuth()">Criar conta</button>
      </div>

      <!-- ── VERIFICAÇÃO POR CÓDIGO ──────────────── -->
      <div class="lform" id="f-verify" style="display:none">
        <div class="verify-header">
          <div class="verify-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="#9B6B42" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <h2 class="verify-title">Verifique seu e-mail</h2>
          <p class="verify-sub">Enviamos um código de 6 dígitos para<br><strong id="v-email-display">seu e-mail</strong>.</p>
        </div>

        <div class="code-inputs" id="code-inputs">
          <input type="tel" inputmode="numeric" maxlength="1" class="code-cell" data-i="0" autocomplete="one-time-code">
          <input type="tel" inputmode="numeric" maxlength="1" class="code-cell" data-i="1">
          <input type="tel" inputmode="numeric" maxlength="1" class="code-cell" data-i="2">
          <input type="tel" inputmode="numeric" maxlength="1" class="code-cell" data-i="3">
          <input type="tel" inputmode="numeric" maxlength="1" class="code-cell" data-i="4">
          <input type="tel" inputmode="numeric" maxlength="1" class="code-cell" data-i="5">
        </div>

        <button class="btn btn-primary btn-full btn-lg" onclick="doVerify()">Confirmar código</button>
        <div class="verify-foot">
          Não recebeu? <a id="v-resend" onclick="doResend()">Reenviar código</a>
          <span id="v-resend-timer" class="verify-timer"></span>
        </div>
        <div class="verify-foot"><a onclick="cancelVerify()">← Usar outro e-mail</a></div>
      </div>

      <div class="lswitch" id="sw-login">Não tem conta? <a onclick="swapForm('register')">Cadastre-se</a></div>
      <div class="lswitch" id="sw-register" style="display:none">Já tem conta? <a onclick="swapForm('login')">Entrar</a></div>
    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/utils/dom.js"></script>
  <script src="../js/utils/storage.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/mock.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/components/modal.js"></script>
  <script src="../js/components/confirm.js"></script>
  <script src="../js/components/navbar.js"></script>
  <script src="../js/components/sidebar.js"></script>
  <script src="../js/components/card.js"></script>
  <script src="../js/components/button.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/login.js"></script>
</body>
</html>
